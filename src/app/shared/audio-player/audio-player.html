<div class="bg-white rounded-lg shadow-sm border border-gray-100 p-4 flex items-center gap-4">
  <button
    (click)="togglePlay()"
    class="flex items-center justify-center w-12 h-12 rounded-full bg-emerald-600 text-white hover:bg-emerald-700 transition-colors shrink-0"
  >
    @if (isCurrentlyPlaying()) {
      <!-- Icône pause -->
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="4" width="4" height="16" />
        <rect x="14" y="4" width="4" height="16" />
      </svg>
    } @else {
      <!-- Icône play -->
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z" />
      </svg>
    }
  </button>

  <div class="flex-1">
    <input
      type="range"
      min="0"
      max="100"
      [value]="player.progress()"
      (input)="onSeek($event)"
      class="w-full accent-emerald-600"
    />
    <div class="flex justify-between text-xs text-gray-500 mt-1">
      <span>{{ formatTime(player.currentTime()) }}</span>
      <span>{{ formatTime(player.duration()) }}</span>
    </div>
  </div>
</div>
