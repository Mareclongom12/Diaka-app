<div class="relative min-h-screen bg-gradient-to-b from-emerald-50 via-white to-white overflow-hidden">
  <svg class="absolute inset-0 w-full h-full opacity-[0.04] pointer-events-none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="profilePattern" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
        <g stroke="#0d9488" stroke-width="1.5" fill="none">
          <path d="M40 5 L52 20 L40 35 L28 20 Z" />
          <path d="M40 45 L52 60 L40 75 L28 60 Z" />
          <path d="M5 40 L20 28 L35 40 L20 52 Z" />
          <path d="M45 40 L60 28 L75 40 L60 52 Z" />
          <circle cx="40" cy="40" r="6" />
        </g>
      </pattern>
    </defs>
    <rect x="0" y="0" width="100%" height="100%" fill="url(#profilePattern)" />
  </svg>

  <div class="relative max-w-2xl mx-auto p-4 sm:p-6">
    <h1 class="text-xl sm:text-2xl font-bold mb-6 text-gray-900">Mon profil</h1>

    @if (authService.currentUser(); as user) {
      <div class="bg-white rounded-2xl shadow-sm shadow-emerald-100/50 border border-emerald-50 p-6 sm:p-8 mb-5 text-center">
        <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center text-white text-2xl font-bold shadow-md shadow-emerald-100">
          {{ initials() }}
        </div>
        <h2 class="text-xl font-bold text-gray-900">{{ user.name }}</h2>
        <p class="text-sm text-gray-500">{{ user.email }}</p>
      </div>

      <div class="grid grid-cols-2 gap-4 mb-5">
        <a routerLink="/favoris" class="bg-white rounded-2xl shadow-sm border border-emerald-50 p-5 text-center hover:shadow-md hover:border-emerald-100 transition-all">
          <div class="w-10 h-10 mx-auto mb-2 rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-600">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z" /></svg>
          </div>
          <p class="text-2xl font-bold text-gray-900">{{ favorisCount() }}</p>
          <p class="text-xs text-gray-500">Favoris</p>
        </a>

        <a routerLink="/telechargements" class="bg-white rounded-2xl shadow-sm border border-emerald-50 p-5 text-center hover:shadow-md hover:border-emerald-100 transition-all">
          <div class="w-10 h-10 mx-auto mb-2 rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-600">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>
          </div>
          <p class="text-2xl font-bold text-gray-900">{{ downloadsCount() }}</p>
          <p class="text-xs text-gray-500">Téléchargements</p>
        </a>
      </div>

      <div class="flex flex-col sm:flex-row gap-3">
        <a routerLink="/quiz" class="flex-1 bg-white text-emerald-700 py-3 rounded-xl font-semibold border-2 border-emerald-100 hover:bg-emerald-50 transition-all text-center">
          Tester mes connaissances
        </a>
        <a routerLink="/sourates" class="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-semibold shadow-lg shadow-emerald-200 hover:bg-emerald-700 transition-all text-center">
          Parcourir les sourates
        </a>
      </div>
    } @else {
      <div class="bg-white rounded-2xl border border-emerald-50 p-8 animate-pulse">
        <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-gray-200"></div>
        <div class="h-5 bg-gray-200 rounded w-1/3 mx-auto mb-2"></div>
        <div class="h-3 bg-gray-100 rounded w-1/2 mx-auto"></div>
      </div>
    }
  </div>
</div>
